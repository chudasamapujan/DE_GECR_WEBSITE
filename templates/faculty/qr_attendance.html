<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance - Faculty | GEC Rajkot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
        .qr-pulse {
            animation: pulse-slow 2s ease-in-out infinite;
        }
        @keyframes countdown {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: 283; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-indigo-600">QR Attendance System</h1>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/faculty/dashboard" class="text-gray-600 hover:text-indigo-600">Dashboard</a>
                    <a href="/faculty/students" class="text-gray-600 hover:text-indigo-600">Students</a>
                    <a href="/faculty/subjects" class="text-gray-600 hover:text-indigo-600">Subjects</a>
                    <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tab Navigation -->
        <div class="bg-white rounded-lg shadow-sm mb-6">
            <div class="border-b border-gray-200">
                <nav class="-mb-px flex">
                    <button onclick="switchTab('generate')" id="tab-generate" 
                        class="tab-button active border-b-2 border-indigo-500 text-indigo-600 py-4 px-6 font-medium">
                        Generate QR
                    </button>
                    <button onclick="switchTab('sessions')" id="tab-sessions"
                        class="tab-button border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 py-4 px-6 font-medium">
                        My Sessions
                    </button>
                </nav>
            </div>
        </div>

        <!-- Generate QR Tab -->
        <div id="content-generate" class="tab-content">
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Left: Form -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Attendance Session</h2>
                    
                    <form id="qrForm" class="space-y-4">
                        <!-- Subject Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                            <select id="subjectSelect" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="">Select Subject</option>
                            </select>
                        </div>

                        <!-- Date -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                            <input type="date" id="sessionDate" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>

                        <!-- Time -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Time</label>
                            <input type="time" id="sessionTime" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>

                        <!-- Duration -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Duration (minutes)</label>
                            <input type="number" id="duration" value="30" min="5" max="180" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>

                        <!-- Options -->
                        <div class="space-y-2">
                            <label class="flex items-center">
                                <input type="checkbox" id="requirePhoto" checked
                                    class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <span class="ml-2 text-sm text-gray-700">Require student photo</span>
                            </label>
                            <label class="flex items-center">
                                <input type="checkbox" id="requireLocation"
                                    class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <span class="ml-2 text-sm text-gray-700">Require GPS location</span>
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" 
                            class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-indigo-700 hover:to-blue-700 transition-all duration-200 shadow-lg hover:shadow-xl">
                            Generate QR Code
                        </button>
                    </form>
                </div>

                <!-- Right: QR Display -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div id="qrPlaceholder" class="text-center py-12">
                        <svg class="w-24 h-24 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                        </svg>
                        <p class="text-gray-500">QR Code will appear here after generation</p>
                    </div>

                    <div id="qrDisplay" class="hidden">
                        <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">Scan to Mark Attendance</h3>
                        
                        <!-- QR Code Image -->
                        <div class="bg-gradient-to-br from-indigo-50 to-blue-50 p-6 rounded-lg mb-4">
                            <img id="qrImage" src="" alt="QR Code" class="mx-auto qr-pulse max-w-full">
                        </div>

                        <!-- Session Info -->
                        <div class="bg-gray-50 rounded-lg p-4 mb-4">
                            <h4 class="font-semibold text-gray-700 mb-2">Session Details</h4>
                            <div class="space-y-1 text-sm">
                                <p><span class="font-medium">Subject:</span> <span id="displaySubject"></span></p>
                                <p><span class="font-medium">Date:</span> <span id="displayDate"></span></p>
                                <p><span class="font-medium">Time:</span> <span id="displayTime"></span></p>
                                <p><span class="font-medium">Expires:</span> <span id="displayExpiry" class="text-red-600"></span></p>
                            </div>
                        </div>

                        <!-- Countdown Timer -->
                        <div class="text-center mb-4">
                            <div class="inline-block">
                                <div class="text-3xl font-bold text-indigo-600" id="countdown">--:--</div>
                                <p class="text-sm text-gray-500">Time Remaining</p>
                            </div>
                        </div>

                        <!-- Live Attendance Counter -->
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                            <div class="text-center">
                                <div class="text-4xl font-bold text-green-600" id="attendanceCount">0</div>
                                <p class="text-sm text-gray-600">Students Present</p>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="flex gap-2">
                            <button onclick="viewSessionDetails()" 
                                class="flex-1 bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700">
                                View Details
                            </button>
                            <button onclick="closeSession()" 
                                class="flex-1 bg-red-600 text-white py-2 px-4 rounded-lg hover:bg-red-700">
                                Close Session
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sessions Tab -->
        <div id="content-sessions" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">My QR Sessions</h2>
                
                <!-- Filters -->
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                        <select id="statusFilter" onchange="loadSessions()"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            <option value="">All</option>
                            <option value="active">Active</option>
                            <option value="expired">Expired</option>
                            <option value="closed">Closed</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                        <input type="date" id="dateFilter" onchange="loadSessions()"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex items-end">
                        <button onclick="loadSessions()" 
                            class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700">
                            Refresh
                        </button>
                    </div>
                </div>

                <!-- Sessions List -->
                <div id="sessionsList" class="space-y-4">
                    <p class="text-center text-gray-500 py-8">Loading sessions...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSession = null;
        let countdownInterval = null;
        let refreshInterval = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSubjects();
            setDefaultDateTime();
        });

        // Load subjects for dropdown
        async function loadSubjects() {
            try {
                const response = await fetch('/api/faculty/subjects');
                const data = await response.json();
                
                console.log('Subjects loaded:', data); // Debug log
                
                const select = document.getElementById('subjectSelect');
                select.innerHTML = '<option value="">Select Subject</option>';
                
                if (data.subjects && data.subjects.length > 0) {
                    data.subjects.forEach(subject => {
                        const option = document.createElement('option');
                        option.value = subject.subject_id;
                        option.textContent = `${subject.subject_name} (${subject.department}, Sem ${subject.semester})`;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="">No subjects created yet</option>';
                    console.warn('No subjects found for this faculty');
                }
            } catch (error) {
                console.error('Error loading subjects:', error);
                const select = document.getElementById('subjectSelect');
                select.innerHTML = '<option value="">Error loading subjects</option>';
            }
        }

        // Set default date and time to now
        function setDefaultDateTime() {
            const now = new Date();
            document.getElementById('sessionDate').valueAsDate = now;
            document.getElementById('sessionTime').value = now.toTimeString().slice(0, 5);
        }

        // Generate QR Code
        document.getElementById('qrForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                subject_id: parseInt(document.getElementById('subjectSelect').value),
                session_date: document.getElementById('sessionDate').value,
                session_time: document.getElementById('sessionTime').value,
                duration_minutes: parseInt(document.getElementById('duration').value),
                require_photo: document.getElementById('requirePhoto').checked,
                require_location: document.getElementById('requireLocation').checked
            };

            try {
                const response = await fetch('/api/qr-attendance/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate QR');
                }

                currentSession = data.session;
                displayQR(data.qr_code_base64, data.session);
                startCountdown(data.session.expires_at);
                startAttendanceRefresh(data.session.session_id);

            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        // Display generated QR code
        function displayQR(qrBase64, session) {
            document.getElementById('qrPlaceholder').classList.add('hidden');
            document.getElementById('qrDisplay').classList.remove('hidden');
            
            document.getElementById('qrImage').src = `data:image/png;base64,${qrBase64}`;
            document.getElementById('displaySubject').textContent = session.subject_name;
            document.getElementById('displayDate').textContent = session.session_date;
            document.getElementById('displayTime').textContent = session.session_time;
            document.getElementById('displayExpiry').textContent = new Date(session.expires_at).toLocaleString();
        }

        // Countdown timer
        function startCountdown(expiryTime) {
            if (countdownInterval) clearInterval(countdownInterval);
            
            const updateCountdown = () => {
                const now = new Date();
                const expiry = new Date(expiryTime);
                const diff = expiry - now;

                if (diff <= 0) {
                    document.getElementById('countdown').textContent = 'EXPIRED';
                    clearInterval(countdownInterval);
                    return;
                }

                const minutes = Math.floor(diff / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            };

            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        // Refresh attendance count
        function startAttendanceRefresh(sessionId) {
            if (refreshInterval) clearInterval(refreshInterval);
            
            const refreshCount = async () => {
                try {
                    const response = await fetch(`/api/qr-attendance/sessions/${sessionId}`);
                    const data = await response.json();
                    document.getElementById('attendanceCount').textContent = data.total_present || 0;
                } catch (error) {
                    console.error('Error refreshing count:', error);
                }
            };

            refreshCount();
            refreshInterval = setInterval(refreshCount, 3000); // Refresh every 3 seconds
        }

        // View session details
        function viewSessionDetails() {
            if (currentSession) {
                window.location.href = `/faculty/qr-attendance/session/${currentSession.session_id}`;
            }
        }

        // Close session
        async function closeSession() {
            if (!currentSession || !confirm('Are you sure you want to close this session?')) return;

            try {
                const response = await fetch(`/api/qr-attendance/sessions/${currentSession.session_id}/close`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert('Session closed successfully');
                    clearInterval(countdownInterval);
                    clearInterval(refreshInterval);
                    document.getElementById('qrPlaceholder').classList.remove('hidden');
                    document.getElementById('qrDisplay').classList.add('hidden');
                    currentSession = null;
                }
            } catch (error) {
                alert('Error closing session: ' + error.message);
            }
        }

        // Switch tabs
        function switchTab(tab) {
            ['generate', 'sessions'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active', 'border-indigo-500', 'text-indigo-600');
                document.getElementById(`tab-${t}`).classList.add('border-transparent', 'text-gray-500');
                document.getElementById(`content-${t}`).classList.add('hidden');
            });

            document.getElementById(`tab-${tab}`).classList.add('active', 'border-indigo-500', 'text-indigo-600');
            document.getElementById(`tab-${tab}`).classList.remove('border-transparent', 'text-gray-500');
            document.getElementById(`content-${tab}`).classList.remove('hidden');

            if (tab === 'sessions') {
                loadSessions();
            }
        }

        // Load sessions list
        async function loadSessions() {
            try {
                const status = document.getElementById('statusFilter').value;
                const date = document.getElementById('dateFilter').value;
                
                let url = '/api/qr-attendance/sessions';
                const params = new URLSearchParams();
                if (status) params.append('status', status);
                if (date) params.append('date', date);
                if (params.toString()) url += '?' + params.toString();

                const response = await fetch(url);
                const data = await response.json();

                const list = document.getElementById('sessionsList');
                
                if (!data.sessions || data.sessions.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-500 py-8">No sessions found</p>';
                    return;
                }

                list.innerHTML = data.sessions.map(session => `
                    <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h3 class="font-semibold text-lg text-gray-800">${session.subject_name}</h3>
                                <div class="mt-2 space-y-1 text-sm text-gray-600">
                                    <p>📅 ${session.session_date} at ${session.session_time}</p>
                                    <p>👥 ${session.attendance_count} students present</p>
                                    <p>⏱️ Expires: ${new Date(session.expires_at).toLocaleString()}</p>
                                </div>
                            </div>
                            <div class="ml-4">
                                <span class="px-3 py-1 rounded-full text-xs font-medium ${
                                    session.status === 'active' ? 'bg-green-100 text-green-800' :
                                    session.status === 'closed' ? 'bg-gray-100 text-gray-800' :
                                    'bg-red-100 text-red-800'
                                }">${session.status.toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="mt-4 flex gap-2">
                            <button onclick="window.location.href='/faculty/qr-attendance/session/${session.session_id}'"
                                class="flex-1 bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 text-sm">
                                View Details
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading sessions:', error);
                document.getElementById('sessionsList').innerHTML = 
                    '<p class="text-center text-red-500 py-8">Error loading sessions</p>';
            }
        }
    </script>
</body>
</html>
